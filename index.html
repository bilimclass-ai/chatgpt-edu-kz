<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ChatGPT Edu — University Rollout Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
:root{
  color-scheme: light;
  /* Executive palette: deep navy ink, steel-blue accent, muted status colors */
  --bg:#f3f5f8;--card:#ffffff;--ink:#1c2b3a;--muted:#5f6b7a;--line:#e2e7ee;
  --navy:#16324f;--navy2:#1f4568;--accent:#1a73c9;--accent2:#3e97e8;
  --good:#1e9e63;--mid:#e08a2e;--bad:#d64545;--neutral:#8a94a3;
  --shadow:0 4px 18px rgba(22,50,79,.08);
}
*{box-sizing:border-box}
body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
  background:var(--bg);color:var(--ink);}
.wrap{max-width:1180px;margin:0 auto;padding:22px 20px 60px}
header.top{display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;
  background:var(--navy);
  color:#fff;border-radius:14px;padding:22px 26px;box-shadow:var(--shadow);}
header.top h1{margin:0;font-size:21px;letter-spacing:.2px;font-weight:700}
header.top p{margin:6px 0 0;opacity:.85;font-size:13.5px}
.rightctrls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.reload{border:0;cursor:pointer;background:rgba(255,255,255,.14);color:#fff;font-weight:700;font-size:13px;padding:9px 14px;border-radius:9px}
.reload:hover{background:rgba(255,255,255,.26)}
.lang{display:flex;gap:6px;background:rgba(255,255,255,.12);padding:5px;border-radius:10px}
.lang button{border:0;cursor:pointer;padding:8px 16px;border-radius:7px;font-weight:700;font-size:13px;background:transparent;color:#fff;transition:.15s;}
.lang button.active{background:#fff;color:var(--navy)}
.disclaimer{display:flex;gap:12px;align-items:flex-start;background:#fdf6e8;border:1px solid #ecd9ad;
  color:#6b5117;border-radius:12px;padding:14px 18px;margin-top:16px;font-size:13px;line-height:1.55}
.disclaimer .ic{font-size:16px;line-height:1.3}
.disclaimer a{color:#8a6a1e;font-weight:700}
.freshness{display:inline-flex;align-items:center;gap:6px;margin-top:8px;background:#fdeaea;border:1px solid #f3b8b8;
  color:#b42323;font-weight:700;padding:5px 12px;border-radius:8px;font-size:12.5px}
.freshness i{width:7px;height:7px;border-radius:50%;background:#d64545;display:inline-block;flex:0 0 auto}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:18px 0 4px}
.kpi{background:var(--card);border-radius:12px;padding:18px 18px 16px;box-shadow:var(--shadow);border-top:4px solid var(--accent)}
.kpi.k1{border-top-color:var(--navy)}.kpi.k1 .val{color:var(--navy)}
.kpi.k2{border-top-color:var(--accent)}.kpi.k2 .val{color:var(--accent)}
.kpi.k3{border-top-color:var(--good)}.kpi.k3 .val{color:var(--good)}
.kpi .val{font-size:29px;font-weight:800;line-height:1.05;color:var(--navy)}
.kpi .lab{color:var(--muted);font-size:13px;margin-top:6px}
.kpi .sub{font-size:12px;margin-top:8px;font-weight:600;color:var(--muted)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.card{background:var(--card);border-radius:12px;padding:20px;box-shadow:var(--shadow);margin-top:18px}
.card h2{margin:0 0 4px;font-size:16px;color:var(--navy)}
.card .hint{color:var(--muted);font-size:12.5px;margin:0 0 14px}
.card .hint .snapnote{color:var(--muted);font-size:11.5px;font-style:italic}
.chartbox{position:relative;height:340px}
.chartbox.tall{height:430px}
select,input[type=text]{width:100%;padding:12px 14px;border-radius:9px;border:1.5px solid var(--line);font-size:14px;color:var(--ink);background:#fff;outline:none;}
select:focus,input:focus{border-color:var(--accent)}
.combo{position:relative}
.combolist{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--line);
  border-radius:9px;max-height:300px;overflow:auto;z-index:20;box-shadow:0 8px 24px rgba(22,50,79,.16)}
.combolist div{padding:10px 14px;cursor:pointer;font-size:13.5px;border-bottom:1px solid #f2f5f9;display:flex;align-items:center;gap:10px}
.combolist div:hover{background:#f0f5fa}
.combolist .pct{flex:0 0 auto;min-width:44px;text-align:center;padding:2px 6px;border-radius:6px;font-size:11.5px;font-weight:700}
.combolist .nores{color:var(--muted);cursor:default}
.spot{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:16px}
.spotcard{border-radius:10px;padding:16px;color:#fff}
.spotcard .n{font-size:25px;font-weight:800}
.spotcard .t{font-size:12.5px;opacity:.9;margin-top:4px}
.spot .s1{background:var(--navy)}
.spot .s2{background:var(--navy2)}
.spot .s3{background:var(--accent)}
.spot .s4{background:var(--accent2)}
.hbars{margin-top:18px;display:grid;gap:9px}
.hbar{display:grid;grid-template-columns:170px 1fr 120px;align-items:center;gap:12px;font-size:12.5px}
.hbar .l{color:var(--muted);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar .track{background:#eceff4;border-radius:6px;height:20px;overflow:hidden}
.hbar .fill{height:100%;border-radius:6px;min-width:4px;transition:width .4s}
.hbar .v{text-align:right;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
@media(max-width:640px){.hbar{grid-template-columns:110px 1fr 90px}}
.spotmeta{margin-top:14px;display:flex;flex-wrap:wrap;gap:10px 22px;font-size:13.5px;color:var(--muted)}
.spotmeta b{color:var(--ink)}
.controls{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-bottom:12px}
.controls .search{flex:1;min-width:220px}
.tablewrap{overflow:auto;border-radius:10px;border:1px solid var(--line)}
table{border-collapse:collapse;width:100%;font-size:13px;min-width:880px}
.pcell{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.pv{font-weight:700;min-width:50px;text-align:right;font-variant-numeric:tabular-nums}
.ptrack{flex:0 0 92px;height:8px;background:#e9edf2;border-radius:99px;overflow:hidden}
.pfill{display:block;height:100%;border-radius:99px;min-width:5px}
.statchip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:var(--ink);background:#f2f5f9;border-radius:99px;padding:3px 10px;white-space:nowrap}
.statchip i{width:8px;height:8px;border-radius:50%;display:inline-block;flex:0 0 auto}
/* project timeline */
.timeline{padding:16px 20px 14px}
.tl-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px}
.tl-head h2{font-size:12.5px;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin:0}
.tl-left{font-size:13px;font-weight:700;color:var(--navy)}
.tl-track{position:relative;height:6px;background:#e2e7ee;border-radius:99px;margin:14px 0 8px}
.tl-fill{position:absolute;left:0;top:0;bottom:0;background:var(--accent);border-radius:99px}
.tl-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;background:var(--accent);border:3px solid #fff;box-shadow:0 0 0 3px rgba(26,115,201,.25)}
.tl-months{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted)}
.tl-dates{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.45}
.tl-dates b{color:var(--ink);font-size:12.5px}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
th{background:#f7f9fc;position:sticky;top:0;cursor:pointer;user-select:none;font-size:12px;color:var(--muted);z-index:1}
th:hover{color:var(--accent)}
td.name{white-space:normal;min-width:280px;font-weight:600}
td.num{text-align:right;font-variant-numeric:tabular-nums}
td.reg{color:var(--muted);font-size:12.5px}
tr:hover td{background:#f7f9fc}
.pill{display:inline-block;min-width:64px;text-align:center;padding:4px 8px;border-radius:6px;color:#fff;font-weight:700;font-size:12px}
.note{color:var(--muted);font-size:12px;margin-top:14px;text-align:center}
.loading{padding:60px;text-align:center;color:var(--muted);font-size:15px}
.spinner{width:34px;height:34px;border:4px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 14px;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.errbox{background:#fdf1f1;border:1px solid #e8c4c4;color:#7c2f2f;padding:18px 20px;border-radius:10px;line-height:1.55}
.errbox b{color:#9c3535}
.errbox code{background:#fff;border:1px solid #eccece;border-radius:6px;padding:1px 6px;font-size:12.5px}
.srcbar{font-size:11.5px;color:var(--muted);text-align:center;margin-top:26px}
.srcbar a{color:var(--accent);text-decoration:none;font-weight:600}
/* signed / not-signed agreement status */
.signstats{display:flex;gap:14px;margin:14px 0}
.signstat{flex:1;border-radius:10px;padding:14px 16px;color:#fff}
.signstat.ok{background:var(--good)}
.signstat.bad{background:var(--bad)}
.signstat .n{font-size:26px;font-weight:800}
.signstat .t{font-size:12px;opacity:.92;margin-top:2px}
.notsigned-title{font-size:12px;font-weight:700;color:var(--muted);margin:6px 0 8px;text-transform:uppercase;letter-spacing:.4px}
.notsigned-list{display:flex;flex-direction:column;gap:6px}
.notsigned-chip{display:flex;justify-content:space-between;align-items:center;gap:12px;background:#fdf1f1;border:1px solid #f3caca;border-radius:8px;padding:9px 12px;font-size:13px}
.notsigned-chip b{color:var(--ink);font-weight:600}
.notsigned-chip span{color:#9c4a4a;font-size:11.5px;white-space:nowrap}
@media(max-width:860px){.kpis{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}.spot{grid-template-columns:repeat(2,1fr)}}
/* phones */
@media(max-width:640px){
  .wrap{padding:12px 10px 40px}
  header.top{padding:14px 16px;border-radius:12px}
  header.top h1{font-size:16.5px}
  header.top p{font-size:12px}
  .reload{padding:8px 11px}
  .lang button{padding:7px 12px;font-size:12px}
  .disclaimer{padding:11px 13px;font-size:12px}
  .kpis{gap:10px;margin:14px 0 2px}
  .kpi{padding:13px 13px 12px}
  .kpi .val{font-size:22px}
  .kpi .lab{font-size:11.5px}
  .card{padding:14px;border-radius:10px}
  .card h2{font-size:15px}
  .chartbox.tall{height:380px}
  .spot{gap:8px}
  .spotcard{padding:11px}
  .spotcard .n{font-size:18px}
  .spotcard .t{font-size:11px}
  .spotmeta{font-size:12.5px;gap:6px 14px}
  .hbar{grid-template-columns:96px 1fr 84px;font-size:11.5px;gap:8px}
  .hbar .track{height:16px}
  th,td{padding:8px 9px}
  .tl-months{display:none}
  .ptrack{flex:0 0 64px}
  .signstats{flex-direction:column}
  .notsigned-chip{flex-direction:column;align-items:flex-start;gap:2px}
}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <h1 id="ttl"></h1>
      <p id="sub"></p>
    </div>
    <div class="rightctrls">
      <button class="reload" onclick="loadData()" id="reloadBtn">⟳</button>
      <div class="lang">
        <button data-l="kz" onclick="setLang('kz')">ҚАЗ</button>
        <button data-l="ru" class="active" onclick="setLang('ru')">РУС</button>
      </div>
    </div>
  </header>

  <div class="disclaimer" id="disc" hidden><div class="ic">ℹ️</div><div id="discTxt"></div></div>

  <div id="app">
    <div class="loading"><div class="spinner"></div><span id="loadtxt">Загрузка данных…</span></div>
  </div>

  <div class="srcbar" id="srcbar"></div>
</div>

<script>
/* ============================================================
   CONFIG
   The dashboard reads a published Google Sheet (CSV) live.
   PRIVACY: point PUBLISHED_CSV at the SANITIZED sheet
   "ChatGPT Edu Dashboard — Public Data (no contacts)"
   (it live-syncs from the master via IMPORTRANGE and contains
   NO contact names, phone numbers, or internal notes).
   Column positions are auto-detected from the header row
   (Licenses / Started / Activated), so both the old 13-column
   and the new 7-column layouts work.
   Optional: a row whose first cell contains "updated/обновлено/жаңартылды"
   with the data refresh date in the next cell — it will be shown
   as the official "data as of" date.
   ============================================================ */
const SHEET_ID="1q3SkquUjRjqp3LHqT47zbWx9oWBne1N2z9fG5zBSMeU";
const PUBLISHED_CSV="https://docs.google.com/spreadsheets/d/e/2PACX-1vS1CVX1xx2qx3YJXPhkgeHmhw4dNFIkBxTCFzOHj_RwYaXQBF0GOxIFfWExpeAmvj7Xwn0bZFqAVt9A/pub?output=csv";
const POWERBI_URL="https://app.powerbi.com/view?r=eyJrIjoiNjM4OWUyZDQtMWUxNy00Njc3LTllZjEtNDBmNzgzZjA2Y2JkIiwidCI6IjQ0YWY2MTM1LTFmMTYtNGU3ZS04MzViLTAwYWY1MTdkZTNmNyIsImMiOjl9";
/* Dashboard_Data tab: auto-refreshed from Power BI by the sheet's script
   (daily + every 6h). No contact data. Falls back to the published CSV. */
const ENDPOINTS=[
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=1969320767`,
  PUBLISHED_CSV];
/* Refresh_Info tab: official Power BI refresh date, updated automatically */
const META_CSV=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=433329528`;

/* ------------------------------------------------------------
   Agreement (joining-contract) status — pulled manually from
   page 1 of the Power BI report ("Организации, которые
   подписали / не подписали договор присоединения"), since this
   breakdown is not yet part of the published Google Sheet feed.
   Update this block whenever the Power BI numbers change, or
   better: add a live-synced tab to the sheet and wire ENDPOINT
   fetching in here the same way the license data works.
   ------------------------------------------------------------ */
const SIGN_STATUS={
  asOf:"13.07.2026 11:07",
  signed:99,
  notSigned:[
    {name:"Де Монтфорт университеті",region:"г. Алматы",district:"Медеуский р-н"},
    {name:"КИМЭП Университеті",region:"г. Алматы",district:"Медеуский р-н"},
    {name:"Күләш Байсейітова атындағы Қазақ ұлттық өнер университеті",region:"г. Астана",district:"р-н Алматы"},
    {name:"Maqsut Narikbayev University",region:"г. Астана",district:"р-н Нура"},
    {name:"«Орталық – Қазақстан Академиясы» ЧУ",region:"Карагандинская обл.",district:""},
    {name:"Карагандинский университет Казпотребсоюза",region:"Карагандинская обл.",district:""}
  ]
};
/* Some not-yet-signed organizations already have a placeholder row in the
   license sheet (0% activation), which would otherwise put them on the
   "needs attention" chart even though they haven't joined the project yet.
   Filter them out of that chart using distinctive keyword matches. */
/* Matched by row "№" id (col 0 of the sheet) rather than name text —
   Kazakh Cyrillic diacritics (ә/і/ғ/ұ/қ) make free-text matching between
   the Power BI screenshot and the sheet's spelling unreliable. IDs:
   49 Карагандинский университет Казпотребсоюза · 60 Maqsut Narikbayev University ·
   64 КИМЭП Университеті · 66 Күләш Байсейітова атындағы ... өнер университеті ·
   89 «Орталық – Қазақстан Академиясы» · 102 Де Монтфорт университеті */
const NOT_SIGNED_IDS=new Set([49,60,64,66,89,102]);
function isNotSigned(row){return NOT_SIGNED_IDS.has(row.id);}

/* ---------- i18n ---------- */
const T={
  ru:{
    title:"ChatGPT Edu в вузах Казахстана",
    sub:"Показатели активации лицензий ChatGPT Edu по вузам Казахстана.",
    loading:"Загрузка данных…",
    universities:"Вузов",licenses:"Выделено всего лицензий",activated:"Активировано лицензий",

    spotTitle:"Профиль вуза",spotHint:"Начните вводить название вуза, чтобы найти его и увидеть показатели.",
    selectPh:"Поиск вуза…",noMatch:"Ничего не найдено",
    sLic:"Лицензий",sStarted:"Начали обучение",sAct:"Активировано",sPct:"Процент активации",
    bLic:"Выдано лицензий",bStarted:"Начали обучение",bAct:"Активировано",bAvg:"Общий охват по стране",
    rank:"Место по стране",of:"из",above:"выше среднего",below:"ниже среднего",
    region:"Регион",district:"Район",
    tableTitle:"Все вузы",searchPh:"Поиск по вузу или региону…",
    cRank:"№",cName:"Вуз",cRegion:"Регион",cLic:"Лицензии",cStarted:"Начали обучение",cAct:"Актив.",cPct:"Активация %",cStatus:"Статус",
    st:["Требует внимания","Начальный этап","По плану","Отлично"],
    tlTitle:"Сроки проекта · 12 месяцев",tlStart:"Запуск проекта",tlEnd:"Завершение проекта",
    disclaimer:'Данные синхронизируются с базой ChatGPT Edu через Power BI и могут отставать до <b>48 часов</b>.',
    dataAsOf:"Последнее обновление данных",loadedAt:"Страница загружена",
    liveNote:"Данные загружаются автоматически при каждом открытии страницы. Кнопка ⟳ вверху — обновить.",
    pbiLink:"Отчёт Power BI",
    errTitle:"Не удалось загрузить данные.",
    errBody:"Проверьте, что таблица-источник опубликована в интернете (<b>Файл → Опубликовать в интернете → CSV</b>) и ссылка указана в поле <code>PUBLISHED_CSV</code> в коде страницы.",
    signTitle:"Статус подписания договора присоединения",
    signHint:"Организации, официально присоединившиеся к проекту ChatGPT Edu.",
    snapNote:"по данным Power BI на",
    signedLbl:"Подписали договор",
    notSignedLbl:"Ещё не подписали",
    notSignedListTitle:"Пока не подписали:"
  },
  kz:{
    title:"ChatGPT Edu — Қазақстан ЖОО-ларында",
    sub:"Қазақстан ЖОО-лары бойынша ChatGPT Edu лицензияларын белсендіру көрсеткіштері.",
    loading:"Деректер жүктелуде…",
    universities:"ЖОО саны",licenses:"Барлығы бөлінген лицензиялар",activated:"Белсендірілген лицензиялар",
    national:"Жалпы қамту (белсендіру)",natSub:"белсендірілген ÷ бөлінген лицензиялар",started:"Оқуды бастады",
    topTitle:"Белсендіру көшбасшылары",topHint:"Лицензияларды белсендіру пайызы бойынша үздік 10 ЖОО.",
    lowTitle:"Назар аударуды қажет етеді",lowHint:"Шартқа қол қойған, белсендіру пайызы ең төмен 10 ЖОО.",
    spotTitle:"ЖОО профилі",spotHint:"ЖОО-ны табу үшін атауын тере бастаңыз.",
    selectPh:"ЖОО іздеу…",noMatch:"Ештеңе табылмады",
    sLic:"Лицензиялар",sStarted:"Оқуды бастады",sAct:"Белсендірілді",sPct:"Белсендіру пайызы",
    bLic:"Берілген лицензиялар",bStarted:"Оқуды бастады",bAct:"Белсендірілді",bAvg:"Ел бойынша жалпы қамту",
    rank:"Ел бойынша орны",of:"ішінде",above:"орташадан жоғары",below:"орташадан төмен",
    region:"Аймақ",district:"Аудан",

/* Display-level standardization of university names:
   strips legal-form clutter (КеАҚ, АҚ, ЖШС, "коммерциялық емес
   акционерлік қоғамы", мекемесі …). Raw names stay untouched in the
   sheet — the Power BI sync matches by raw name. */
function cleanName(s){
  let n=String(s||"");
  [/мекемесі нысанындағы коммерциялық емес үкіметтік емес ұйым/gi,
   /коммерциялық емес акционерлік қоғам(ына|ы)?/gi,
   /Коммерциялық емес Акционерлік қоғам(ы)?/gi,
   /КОММЕРЦИЯЛЫҚ\s+ЕМЕС АКЦИОНЕРЛІК ҚОҒАМЫ/gi,
   /коммерциялық емес АҚ/gi,
   /акционерлік қоғамы?/gi,
   /Жауапкершiлiгi шектеулi серiктестiгі\.?/gi,
   /жоғары білім мекемесі/gi,
   /Білім беру мекемесі/gi,
   /Жеке Меншік Мекемесі/gi,
   /жеке мекемесі/gi,
   /шетелдік оқу орны»?/gi
  ].forEach(re=>n=n.replace(re," "));
  n=n.split(/\s+/).filter(w=>{
    const t=w.replace(/[«»"“”().,]/g,"");
    return !["КеАҚ","КЕАҚ","КЕ","АҚ","АО","НАО","ЖШС","ТОО","МЕББМ","ЖЖКББМ","ЖММ","ББМ","БМ","РМК","ШЖҚ","Мекемесі","мекемесі"].includes(t);
  }).join(" ");
  n=n.replace(/[«»"“”]/g," ").replace(/\s{2,}/g," ").replace(/^[\s,.\-–]+|[\s,.\-–]+$/g,"").trim();
  return n||String(s||"");
}

/* ---------- CSV parsing ---------- */
function parseCSV(text){
  const rows=[];let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){const ch=text[i];
    if(q){ if(ch==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=ch; }
    else{ if(ch==='"')q=true; else if(ch===','){row.push(cur);cur="";}
      else if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur="";}
      else if(ch==='\r'){} else cur+=ch; }
  }
  if(cur.length||row.length){row.push(cur);rows.push(row);}
  return rows;
}
function num(s){if(s==null)return 0;const v=parseFloat(String(s).replace(/[^0-9.\-]/g,""));return isNaN(v)?0:v;}
function buildRows(cells2d){
  const rows=[];dataDate=null;
  /* detect column positions from the header row; fall back to legacy layout */
  let iLic=4,iStart=7,iAct=8;
  const hdr=cells2d.find(c=>c&&c.some(x=>/started|бастады/i.test(x||""))&&c.some(x=>/activated|белсенд/i.test(x||"")));
  if(hdr){
    const f=(re,d)=>{const i=hdr.findIndex(x=>re.test(x||""));return i<0?d:i;};
    iLic=f(/лицензия|license/i,4);iStart=f(/started|бастады/i,7);iAct=f(/activated|белсенд/i,8);
  }
  const need=Math.max(iLic,iStart,iAct)+1;
  cells2d.forEach(c=>{
    if(!c||!c.length)return;
    const first=(c[0]||"").trim();
    if(/обновлен|updated|жаңартыл/i.test(first)&&c[1]){dataDate=(c[1]||"").trim();return;}
    if(c.length<need)return;
    if(!/^\d+$/.test(first))return;           // skip header + totals + blanks
    const licenses=num(c[iLic]),started=num(c[iStart]),activated=num(c[iAct]);
    if(licenses<=0)return;
    /* NOTE: contact names / phone numbers / notes are intentionally NOT read */
    rows.push({id:+first,name:(c[1]||"—").trim(),region:(c[2]||"").trim(),district:(c[3]||"").trim(),
      licenses,started,activated,
      pct:licenses>0?activated/licenses*100:0});
  });
  rows.sort((a,b)=>b.pct-a.pct);
  rows.forEach((r,i)=>r.rank=i+1);
  return rows;
}
function computeNational(){
  const lic=DATA.reduce((s,r)=>s+r.licenses,0);
  const act=DATA.reduce((s,r)=>s+r.activated,0);
  const st=DATA.reduce((s,r)=>s+r.started,0);
  const avg=DATA.length?DATA.reduce((s,r)=>s+r.pct,0)/DATA.length:0;
  NAT={lic,act,started:st,pctWeighted:lic>0?act/lic*100:0,pctAvg:avg};
}

/* ---------- data load ---------- */
async function loadData(silent){
  const btn=document.getElementById("reloadBtn"); if(btn)btn.textContent="…";
  if(!silent)document.getElementById("app").innerHTML='<div class="loading"><div class="spinner"></div><span>'+T[LANG].loading+'</span></div>';
  let text=null,lastErr=null;
  for(const url of ENDPOINTS){
    try{ const res=await fetch(url,{cache:"no-store"}); if(!res.ok)throw new Error("HTTP "+res.status);
      const t=await res.text();
      if(t && t.trim().length && !/^<!DOCTYPE|^<html/i.test(t.trim())){ text=t; break; }
      lastErr=new Error("Non-CSV response");
    }catch(e){ lastErr=e; }
  }
  if(btn)btn.textContent="⟳";
  if(!text){ showError(lastErr); return; }
  DATA=buildRows(parseCSV(text));
  if(!DATA.length){ showError(new Error("No rows parsed")); return; }
  computeNational(); lastUpdated=new Date();
  await loadMeta();
  render();
}
/* pull the official Power BI refresh date from the Refresh_Info tab (non-fatal) */
async function loadMeta(){
  try{
    const res=await fetch(META_CSV,{cache:"no-store"});
    if(!res.ok)return;
    const rows=parseCSV(await res.text());
    let pbi=null,refreshed=null;
    for(const r of rows){
      if(!r||!r.length)continue;
      const v=r.slice(1).find(x=>x&&x.trim());
      if(!v)continue;
      if(/power\s*bi/i.test(r[0]||""))pbi=v.trim();
      else if(/refresh|обновлен|жаңартыл/i.test(r[0]||""))refreshed=v.trim();
    }
    if(pbi||refreshed)dataDate=pbi||refreshed;
  }catch(e){/* keep dataDate from data sheet or null */}
}

  const t=T[LANG];

function pctColor(p){
  p=Math.max(0,Math.min(100,p));

  return p>=99?"hsl(135,85%,42%)":`hsl(${h},72%,42%)`;
}

  QVAL=document.getElementById("q").value||"";
  const q=QVAL.toLowerCase().trim();
  let rows=DATA.filter(r=>!q||r.name.toLowerCase().includes(q)||cleanName(r.name).toLowerCase().includes(q)||regName(r.region,LANG).toLowerCase().includes(q)||regName(r.region,"ru").toLowerCase().includes(q));
  rows=rows.slice().sort((a,b)=>{let v;if(sortKey==="name")v=cleanName(a.name).localeCompare(cleanName(b.name),"ru");else if(sortKey==="region")v=regName(a.region,LANG).localeCompare(regName(b.region,LANG),"ru");else if(sortKey==="status")v=a.pct-b.pct;else v=a[sortKey]-b[sortKey];return v*sortDir;});
  const arrow=k=>sortKey===k?(sortDir===1?" ▲":" ▼"):"";
  const th=(k,lab,cls="")=>`<th class="${cls}" onclick="setSort('${k}')">${lab}${arrow(k)}</th>`;
  let h=`<thead><tr>${th("rank",t.cRank)}${th("name",t.cName)}${th("region",t.cRegion)}${th("licenses",t.cLic,"num")}${th("started",t.cStarted,"num")}${th("activated",t.cAct,"num")}${th("pct",t.cPct,"num")}${th("status",t.cStatus)}</tr></thead><tbody>`;
  rows.forEach(r=>{
    const s=statusOf(r.pct),sc=STATUS_COLORS[s];
    h+=`<tr>
    <td class="num">${r.rank}</td>
    <td class="name">${esc(cleanName(r.name))}</td>
    <td class="reg">${esc(regName(r.region,LANG))}</td>
    <td class="num">${fmt(r.licenses)}</td><td class="num">${fmt(r.started)}</td><td class="num">${fmt(r.activated)}</td>
    <td class="num"><div class="pcell"><span class="pv" style="color:${pctColor(r.pct)}">${r.pct.toFixed(1)}%</span><span class="ptrack"><span class="pfill" style="width:${Math.min(100,r.pct).toFixed(1)}%;background:${pctColor(r.pct)}"></span></span></div></td>
    <td><span class="statchip"><i style="background:${sc}"></i>${t.st[s]}</span></td></tr>`;});
  h+="</tbody>";document.getElementById("tbl").innerHTML=h;
}
function setSort(k){if(sortKey===k)sortDir*=-1;else{sortKey=k;sortDir=(k==="name"||k==="region")?1:-1;}drawTable();}


headerText();loadData();
/* auto-refresh every 15 minutes while the page is open (only when visible) */
setInterval(()=>{if(document.visibilityState==="visible")loadData(true);},15*60*1000);
</script>
</body>
</html>
